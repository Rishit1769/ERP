version: "3.9"

# Dev override: exposes ports for local access, uses tsx watch, hot reload

services:
  mysql:
    ports:
      - "3306:3306"

  minio:
    ports:
      - "9000:9000"
      - "9001:9001"

  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile.dev
    volumes:
      - ./apps/api/src:/app/src
      - ./packages/shared:/packages/shared
    environment:
      NODE_ENV: development
    ports:
      - "4000:4000"

  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile.dev
    volumes:
      - ./apps/web:/app
      - /app/node_modules
      - /app/.next
    environment:
      NODE_ENV: development
    ports:
      - "3000:3000"
